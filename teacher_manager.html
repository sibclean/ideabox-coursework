<!DOCTYPE html>
<html lang="ru">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Панель управления</title>
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded">
        <h2>Управление пользователями</h2>
        <table class="table table-hover mt-3">
            <thead class="table-dark">
                <tr><th>Имя пользователя</th><th>Роль</th><th>Действие</th></tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td>{{ u.username }}</td>
                    <td><span class="badge {% if u.profile.role == 'TCH' %}bg-success{% else %}bg-primary{% endif %}">{{ u.profile.get_role_display }}</span></td>
                    <td>
                        <form method="post">
                            {% csrf_token %}
                            <input type="hidden" name="user_id" value="{{ u.id }}">
                            <button type="submit" class="btn btn-sm btn-outline-warning">Сменить роль</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/admin/" class="btn btn-secondary mt-3">Назад в админку</a>
    </div>
</body>
</html>
