<!DOCTYPE html>
<html>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f8f9fa;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f8f9fa; padding: 20px;">
        <tr>
            <td align="center">
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                    <tr>
                        <td bgcolor="#007bff" style="padding: 20px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Картотека Идей</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 40px 30px; line-height: 1.6; color: #333333;">
                            <h2 style="margin-top: 0; color: #007bff;">{{ title }}</h2>
                            <p style="font-size: 16px;">{{ message }}</p>
                            {% if action_url %}
                            <div style="text-align: center; margin-top: 30px;">
                                <a href="{{ action_url }}" style="background-color: #28a745; color: #ffffff; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">{{ action_text }}</a>
                            </div>
                            {% endif %}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px; text-align: center; color: #999999; font-size: 12px; border-top: 1px solid #eeeeee;">
                            &copy; 2025 stud-ideas.ru
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
